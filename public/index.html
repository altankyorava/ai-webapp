<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Alina AI</title>

<style>
body { font-family: Arial; max-width: 700px; margin: 40px auto; }
#chat { border: 1px solid #ccc; padding: 10px; min-height: 300px; }
.user { color: blue; margin: 5px 0; }
.ai { color: green; margin: 5px 0; }
</style>

</head>

<body>

<h1>Alina AI 🤖</h1>

<div id="chat"></div>

<input id="message" placeholder="Napíš správu..." />
<button onclick="send()">Poslať</button>

<script>

async function send() {

const input = document.getElementById("message");
const chat = document.getElementById("chat");

const text = input.value;

chat.innerHTML += "<div class='user'><b>Ty:</b> " + text + "</div>";

input.value = "";

const response = await fetch("/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
message: text
})
});

const data = await response.json();

chat.innerHTML += "<div class='ai'><b>Alina:</b> " + data.reply + "</div>";

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
